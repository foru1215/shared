name: Morning Focus Notify

# 毎朝 07:00 JST (22:00 UTC) に今日の集中ポイントを通知
on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 07:00 JST
  workflow_dispatch:

jobs:
  morning-focus:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create morning focus issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // --- 日付計算 (JST) ---
            const now = new Date();
            const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
            const year  = jst.getUTCFullYear();
            const month = jst.getUTCMonth() + 1;
            const day   = jst.getUTCDate();
            const mm    = String(month).padStart(2, '0');
            const dd    = String(day).padStart(2, '0');
            const todayStr = `${year}-${mm}-${dd}`;
            const days  = ['日','月','火','水','木','金','土'];
            const dayName = days[jst.getUTCDay()];

            // --- Issues REST API でアクティブ Issue を取得 ---
            // Projects v2 GraphQL は user-level project スコープが必要なため REST にフォールバック
            const perPage = 100;
            let page = 1;
            let allIssues = [];

            while (true) {
              const resp = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: 'open',
                per_page: perPage,
                page,
              });
              allIssues = allIssues.concat(resp.data);
              if (resp.data.length < perPage) break;
              page++;
            }

            // --- アイテム分類 ---
            const labelNames = (issue) => issue.labels.map(l => l.name);

            const phaseCards    = [];
            const winConditions = [];
            const p0Issues      = [];

            for (const issue of allIssues) {
              const title  = issue.title;
              const labels = labelNames(issue);

              if (title.includes('[PHASE]')) {
                phaseCards.push({ number: issue.number, title });
              } else if (title.includes('[WIN]')) {
                // 今のフェーズ（written-exam）の WIN カードを抽出
                if (labels.includes('phase:written-exam')) {
                  winConditions.push({ number: issue.number, title });
                }
              } else if (labels.includes('priority:p0') && labels.includes('phase:written-exam')) {
                p0Issues.push({ number: issue.number, title });
              }
            }

            // Phase Card: 直前対策期（phase-0）
            const currentPhase = phaseCards.find(c =>
              c.title.includes('直前対策') || c.title.includes('26/03')
            ) || phaseCards[0];

            // ソート（番号昇順）
            winConditions.sort((a, b) => a.number - b.number);
            p0Issues.sort((a, b) => a.number - b.number);

            // --- Issue 本文を構築 ---
            let body = `## ☀️ おはよう！ ${month}/${day}（${dayName}）の朝確認\n\n`;
            body += `> **今日の主役は 1 つ** ： 学科の点数を上げること。\n\n`;
            body += `---\n\n`;

            // 今の Phase
            if (currentPhase) {
              const cleanTitle = currentPhase.title.replace(/^\[.*?\]\s*/, '');
              body += `### 📌 今の Phase\n`;
              body += `- #${currentPhase.number} ${cleanTitle}\n\n`;
            } else {
              body += `### 📌 今の Phase\n`;
              body += `- 直前対策期（2026-03-14 〜 2026-04-27）\n\n`;
            }

            // 勝ち条件（最大3件）
            if (winConditions.length > 0) {
              body += `### 🏆 勝ち条件 (Win Conditions)\n`;
              for (const w of winConditions.slice(0, 3)) {
                const cleanTitle = w.title.replace(/^\[.*?\]\s*/, '');
                body += `- ⬜ #${w.number} ${cleanTitle}\n`;
              }
              body += '\n';
            }

            // 今週・今日の P0 Issues（最大5件）
            if (p0Issues.length > 0) {
              const top = p0Issues.slice(0, 5);
              body += `### ✅ 今日できること (P0 Issues)\n`;
              for (const item of top) {
                body += `- [ ] #${item.number} ${item.title}\n`;
              }
              if (p0Issues.length > 5) {
                body += `\n*他 ${p0Issues.length - 5} 件は今日は見ない*\n`;
              }
              body += '\n';
            } else {
              body += `### ✅ 今日やること\n`;
              body += `- [ ] 第一種電気工事士 学科 過去問を 1 セット解く\n`;
              body += `- [ ] 間違いを 3 分類する（知識不足 / ひっかけ / 計算ミス）\n`;
              body += `- [ ] 弱点を 5 個以内でメモする\n\n`;
            }

            // 今日の記録テンプレート
            body += `---\n\n`;
            body += `### 📝 今日の記録テンプレート\n\n`;
            body += `コメントにコピーして今日の記録を残す。\n\n`;
            body += `\`\`\`\n`;
            body += `## ${todayStr}\n\n`;
            body += `- 解いた問題数: \n`;
            body += `- 正解数: \n`;
            body += `- 正答率: \n`;
            body += `- 間違い分類: 知識不足= / ひっかけ= / 計算ミス=\n`;
            body += `- 今日の弱点 Top3:\n`;
            body += `  - \n`;
            body += `  - \n`;
            body += `  - \n`;
            body += `- 次回やること:\n`;
            body += `  - \n`;
            body += `\`\`\`\n\n`;
            body += `> 💡 WIP 上限 3 つ。迷ったら「今日は学科の点数を上げる行動か？」で判断する。\n`;

            // --- Issue 作成 ---
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[朝通知] ${year}-${mm}-${dd}（${dayName}）`,
              body:  body,
            });

            console.log(`Created morning focus issue #${created.data.number}: ${created.data.html_url}`);
